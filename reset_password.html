<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS Tutor AI - Reset Password</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #F8F9FA;
        }

        .reset-card {
            background: white;
            padding: 56px 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .back-btn-top {
            position: absolute;
            top: 32px;
            left: 32px;
            width: 48px;
            height: 48px;
            background: #F1F5F9;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--deep-navy);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            background: #F1F5F9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            color: var(--teal-green);
            font-size: 40px;
        }

        .reset-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--deep-navy);
            margin-bottom: 12px;
        }

        .reset-subtitle {
            color: var(--subtext);
            font-size: 16px;
            margin-bottom: 48px;
        }

        .input-group-styled {
            text-align: left;
            margin-bottom: 32px;
            position: relative;
        }

        .input-label-styled {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: var(--deep-navy);
            margin-bottom: 12px;
        }

        .input-field-styled {
            width: 100%;
            height: 60px;
            background: #F3F4F6;
            border: none;
            border-radius: 16px;
            padding: 0 56px 0 20px;
            font-size: 16px;
            font-weight: 500;
            color: var(--deep-navy);
            transition: all 0.2s;
        }

        .password-toggle-styled {
            position: absolute;
            right: 20px;
            bottom: 18px;
            font-size: 20px;
            color: #94A3B8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-field-styled:focus {
            background: white;
            box-shadow: 0 0 0 2px var(--teal-green);
            outline: none;
        }

        .btn-large {
            width: 100%;
            height: 60px;
            background: var(--teal-green);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
        }

        .btn-large:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .back-to-login {
            display: block;
            margin-top: 32px;
            color: var(--deep-navy);
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
        }

        .footer-brand {
            font-size: 14px;
            color: #94A3B8;
            font-weight: 600;
            margin-top: 48px;
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <div class="reset-card animate-fade">
            <a href="verify.html" class="back-btn-top">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <div class="logo-circle">
                <i class="fa-solid fa-lock"></i>
            </div>

            <h1 class="reset-title">Reset Password</h1>
            <p class="reset-subtitle">Create a new strong password for your account</p>

            <!-- New Password -->
            <div class="input-group-styled">
                <label class="input-label-styled">New Password</label>
                <input type="password" id="newPassword" class="input-field-styled" placeholder="Enter new password">
                <i class="fa-solid fa-eye password-toggle-styled" id="toggleP1"
                    onclick="toggleVisibility('newPassword', 'toggleP1')"></i>
            </div>

            <!-- Confirm Password -->
            <div class="input-group-styled">
                <label class="input-label-styled">Confirm Password</label>
                <input type="password" id="confirmPassword" class="input-field-styled"
                    placeholder="Confirm new password">
                <i class="fa-solid fa-eye password-toggle-styled" id="toggleP2"
                    onclick="toggleVisibility('confirmPassword', 'toggleP2')"></i>
            </div>

            <button class="btn-large" id="resetBtn" onclick="handleReset()">Reset Password</button>

            <a href="signin.html" class="back-to-login">Back to Login</a>

            <div class="footer-brand">
                Powered by SIMATS
            </div>
        </div>
    </div>

    <script>
        function toggleVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function handleReset() {
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const email = localStorage.getItem('tempEmail');

            if (!email) {
                alert("Session expired. Please start the forgot password process again.");
                window.location.href = 'forgot_password.html';
                return;
            }

            // Standards Validation (Regex for complexity)
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$/;
            if (!passwordRegex.test(newPassword)) {
                alert("Invalid credentials: Password must contain a special character, capital letter, small letter, number, and be at least 8 characters long.");
                return;
            }

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            const resetBtn = document.getElementById('resetBtn');
            resetBtn.innerText = "Updating...";
            resetBtn.disabled = true;

            try {
                const response = await fetch(`${CONFIG.BASE_URL}/reset_password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: newPassword })
                });

                const data = await response.json();
                if (response.ok) {
                    alert("Password reset successfully! Plese log in.");
                    localStorage.removeItem('resetMode');
                    localStorage.removeItem('tempEmail');
                    window.location.href = 'signin.html';
                } else {
                    alert(data.message || "Failed to reset password. Please try again.");
                }
            } catch (error) {
                alert("Connection error: " + error.message);
            } finally {
                resetBtn.innerText = "Reset Password";
                resetBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
