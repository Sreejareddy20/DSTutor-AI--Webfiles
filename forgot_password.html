<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS Tutor AI - Forgot Password</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <style>
        .forgot-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #F8F9FA;
        }

        .forgot-card {
            background: white;
            padding: 48px 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .back-btn-top {
            position: absolute;
            top: 32px;
            left: 32px;
            width: 48px;
            height: 48px;
            background: #F1F5F9;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--deep-navy);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn-top:hover {
            background: #E2E8F0;
            transform: translateX(-4px);
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            background: #F1F5F9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            color: var(--teal-green);
            font-size: 48px;
        }

        .forgot-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--deep-navy);
            margin-bottom: 12px;
        }

        .forgot-subtitle {
            color: var(--subtext);
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 48px;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        .input-group-styled {
            text-align: left;
            margin-bottom: 40px;
        }

        .input-label-styled {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: var(--deep-navy);
            margin-bottom: 12px;
        }

        .input-field-styled {
            width: 100%;
            height: 60px;
            background: #F3F4F6;
            border: none;
            border-radius: 16px;
            padding: 0 20px;
            font-size: 16px;
            font-weight: 500;
            color: var(--deep-navy);
            transition: all 0.2s;
        }

        .input-field-styled:focus {
            background: white;
            box-shadow: 0 0 0 2px var(--teal-green);
            outline: none;
        }

        .btn-large {
            width: 100%;
            height: 60px;
            background: var(--teal-green);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 48px;
        }

        .btn-large:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(19, 157, 119, 0.2);
        }

        .btn-large:disabled {
            background: #A0AEC0;
            cursor: not-allowed;
            transform: none;
        }

        .footer-brand {
            font-size: 14px;
            color: #94A3B8;
            font-weight: 600;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <div class="forgot-container">
        <!-- Main Card -->
        <div class="forgot-card animate-fade">
            <!-- Back Button -->
            <a href="signin.html" class="back-btn-top">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <!-- Logo Circle -->
            <div class="logo-circle">
                <i class="fa-solid fa-envelope"></i>
            </div>

            <!-- Header -->
            <h1 class="forgot-title">Forgot Password</h1>
            <p class="forgot-subtitle">Enter your email address to receive an OTP and reset your password</p>

            <!-- Form -->
            <div class="input-group-styled">
                <label class="input-label-styled">Email Address</label>
                <input type="email" id="emailInput" class="input-field-styled" placeholder="Enter your email">
            </div>

            <button class="btn-large" id="resetBtn" onclick="sendResetLink()">Send OTP</button>

            <!-- Brand Footer -->
            <div class="footer-brand">
                Powered by SIMATS
            </div>
        </div>
    </div>

    <script>
        async function sendResetLink() {
            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value.trim();
            const resetBtn = document.getElementById('resetBtn');

            // 1. Email Validation (Must end with @gmail.com)
            if (!email || !email.endsWith("@gmail.com")) {
                alert("Invalid credentials: Email must end with @gmail.com");
                return;
            }

            resetBtn.innerText = "Sending OTP...";
            resetBtn.disabled = true;

            try {
                // Call dedicated forgot_password endpoint
                const response = await fetch(`${CONFIG.BASE_URL}/forgot_password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('tempEmail', email);
                    localStorage.setItem('resetMode', 'true'); // Flag for verification screen
                    alert(data.message || "A verification code has been sent. Please check your email.");
                    window.location.href = 'verify.html';
                } else {
                    alert(data.message || "Email not registered or error occurred. Please try again.");
                }
            } catch (error) {
                alert("Connection error: Unable to reach the server. Please ensure the backend is running.");
            } finally {
                resetBtn.innerText = "Send OTP";
                resetBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
