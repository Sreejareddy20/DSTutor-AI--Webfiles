<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS Tutor AI - AI Chat Assistant</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <style>
        .chat-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        .chat-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--deep-navy);
            margin: 0;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--teal-green);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--teal-green);
            border-radius: 50%;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(19, 157, 119, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(19, 157, 119, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(19, 157, 119, 0);
            }
        }

        .messages-container {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: white;
        }

        .bubble {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease forwards;
        }

        .bubble-ai {
            align-self: flex-start;
            background: #F3F4F6;
            color: var(--deep-navy);
            border-bottom-left-radius: 4px;
        }

        .bubble-user {
            align-self: flex-end;
            background: var(--teal-green);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .thinking-bubble {
            align-self: flex-start;
            display: none;
            align-items: center;
            gap: 8px;
            background: #F3F4F6;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            color: var(--subtext);
            margin-bottom: 8px;
        }

        .thinking-pulse {
            width: 6px;
            height: 6px;
            background: var(--teal-green);
            border-radius: 50%;
            animation: bounce 1s infinite alternate;
        }

        .thinking-pulse:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-pulse:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
                opacity: 0.5;
            }

            to {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        .input-area {
            padding: 24px 32px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 16px;
            background: white;
        }

        .chat-input {
            flex: 1;
            height: 56px;
            background: #F3F4F6;
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            font-size: 16px;
            outline: none;
        }

        .send-button {
            width: 56px;
            height: 56px;
            background: var(--teal-green);
            color: white;
            border-radius: 12px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
        }

        .send-button:hover {
            opacity: 0.9;
        }

        pre {
            background: #0D1B2A;
            color: #139D77;
            padding: 16px;
            border-radius: 12px;
            margin: 12px 0;
            overflow-x: auto;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="topics.html" class="sidebar-logo">
                <i class="fa-solid fa-brain" style="color: var(--teal-green);"></i>
                <span style="color: var(--deep-navy); font-weight: 800;">DS Tutor AI</span>
            </a>

            <nav class="nav-menu">
                <a href="chat.html" class="nav-link active">
                    <i class="fa-solid fa-message"></i>
                    <span>Chat</span>
                </a>
                <a href="topics.html" class="nav-link">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Topics</span>
                </a>
                <a href="visualizer.html" class="nav-link">
                    <i class="fa-solid fa-eye"></i>
                    <span>Visualizer</span>
                </a>
                <a href="practice.html" class="nav-link">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span>Practice</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <i class="fa-solid fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>

            <div style="margin-top: auto; padding-top: 24px; text-align: center;">
                <p style="color: var(--footer); font-size: 14px; font-weight: 600;">Powered by SIMATS</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content chat-layout animate-fade">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-chevron-left" onclick="history.back()"
                        style="cursor: pointer; color: var(--deep-navy);"></i>
                    <h1>AI Assistant</h1>
                </div>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    Online
                </div>
            </div>

            <div class="messages-container" id="chatList">
                <div class="bubble bubble-ai">
                    Hello! I'm your AI Tutor. How can I help you with Data Structures today?
                </div>
            </div>

            <div id="thinking" class="thinking-bubble">
                <div class="thinking-pulse"></div>
                <div class="thinking-pulse"></div>
                <div class="thinking-pulse"></div>
                <span>Thinking...</span>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" class="chat-input" placeholder="Ask a question..."
                    onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-button" onclick="sendMessage()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        const chatList = document.getElementById('chatList');
        const userInput = document.getElementById('userInput');
        const thinkingIndicator = document.getElementById('thinking');
        const userId = localStorage.getItem('userId') || 1;

        function addMessage(text, isUser) {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${isUser ? 'bubble-user' : 'bubble-ai'}`;

            // Basic Markdown-style code block handling
            let formattedText = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            formattedText = formattedText.replace(/\n/g, '<br>');

            bubble.innerHTML = formattedText;
            chatList.appendChild(bubble);
            chatList.scrollTop = chatList.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = "";
            thinkingIndicator.style.display = 'flex';
            chatList.scrollTop = chatList.scrollHeight;

            try {
                const response = await fetch(`${CONFIG.BASE_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, question: text })
                });

                const data = await response.json();
                thinkingIndicator.style.display = 'none';

                if (response.ok) {
                    addMessage(data.answer, false);
                } else {
                    addMessage("Sorry, I encountered an error. Please try again.", false);
                }
            } catch (error) {
                thinkingIndicator.style.display = 'none';
                addMessage("Connection error. Please check if the backend is running.", false);
            }
        }

        // Handle URL parameters
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                userInput.value = q;
                sendMessage();
            }
        };
    </script>
</body>

</html>
