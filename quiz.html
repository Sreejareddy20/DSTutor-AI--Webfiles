<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS Tutor AI - Quiz Mode</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <style>
        .quiz-page {
            width: 100vw;
            height: 100vh;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 0;
        }

        .quiz-card-large {
            width: 100%;
            max-width: 1000px;
            background: var(--white);
            border-radius: 40px;
            padding: 64px 80px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
        }

        .progress-bar-wide {
            width: 100%;
            height: 12px;
            background: #F1F5F9;
            border-radius: 100px;
            margin-bottom: 64px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--teal-green);
            width: 0%;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .option-card-wide {
            padding: 24px 32px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .option-card-wide:hover {
            border-color: var(--teal-green);
            background: #F0F9F6;
        }

        .option-card-wide.selected {
            background: var(--teal-green);
            border-color: var(--teal-green);
            color: white;
        }

        .option-indicator {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .selected .option-indicator {
            border-color: white;
            background: white;
        }

        .selected .option-indicator::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--teal-green);
            border-radius: 50%;
        }

        .exit-quiz-btn {
            background: none;
            border: none;
            color: #64748B;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            border-radius: 12px;
            transition: all 0.2s;
            margin-top: 48px;
            width: fit-content;
        }

        .exit-quiz-btn:hover {
            background: #F1F5F9;
            color: #EF4444;
        }
    </style>
</head>

<body>
    <div class="quiz-page">
        <div class="quiz-card-large animate-fade">
            <div class="quiz-header">
                <div>
                    <h1 id="quizTitle" style="font-size: 28px; margin-bottom: 4px;">Quiz</h1>
                    <p id="questionCount" style="color: var(--subtext); font-weight: 700;">Question 1 of 5</p>
                </div>
                <div
                    style="background: #F1F5F9; padding: 12px 24px; border-radius: 12px; font-weight: 800; font-size: 14px; color: var(--teal-green);">
                    Practice Mode
                </div>
            </div>

            <div class="progress-bar-wide">
                <div id="pbFill" class="progress-fill"></div>
            </div>

            <div style="margin-bottom: 64px;">
                <h2 id="questionText" style="font-size: 36px; font-weight: 800; line-height: 1.3;">Loading question...
                </h2>
            </div>

            <div id="optionsGroup">
                <!-- Option cards dynamically generated -->
            </div>

            <div style="margin-top: 64px; display: flex; justify-content: space-between; align-items: center;">
                <button class="exit-quiz-btn" onclick="exitQuiz()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Exit Quiz Session
                </button>
                <button id="nextBtn" class="btn btn-primary" style="padding: 0 64px; font-size: 18px; height: 60px;"
                    onclick="handleNext()">
                    Next Question
                </button>
            </div>
        </div>
    </div>

    <script>
        const category = localStorage.getItem('selectedCategory') || "Linear Data Structures";
        document.getElementById('quizTitle').innerText = category;

        const allQuizzes = {
            "Linear Data Structures": [
                { q: "Which property does a Stack follow?", o: ["FIFO", "LIFO", "Random Access", "LILO"], a: 1 },
                { q: "What is the time complexity to access an element in an Array by index?", o: ["O(1)", "O(n)", "O(log n)", "O(1)"], a: 0 },
                { q: "Which structure is best for implementing Undo functionality?", o: ["Queue", "Stack", "List", "Tree"], a: 1 },
                { q: "In a Doubly Linked List, what does each node have?", o: ["One pointer", "Two pointers", "Three pointers", "No pointers"], a: 1 },
                { q: "A Queue works on which principle?", o: ["LIFO", "FIFO", "LILO", "HI-FI"], a: 1 }
            ],
            "Hierarchical Structures": [
                { q: "What is the root of a Tree?", o: ["The bottom node", "The top-most node", "A leaf node", "The widest node"], a: 1 },
                { q: "In a Binary Search Tree, where are smaller values located?", o: ["Right Child", "Left Child", "Root", "Parent"], a: 1 },
                { q: "What is a 'Leaf' node?", o: ["Node with 2 children", "Node with 0 children", "Memory leak node", "Root node"], a: 1 },
                { q: "What is the height of an empty tree?", o: ["0", "1", "-1", "Infinite"], a: 2 },
                { q: "Which heap is used for Priority Queues?", o: ["Max Heap", "Min Heap", "Both", "None"], a: 2 }
            ],
            "Non-Linear Structures": [
                { q: "What is a collection of nodes and edges?", o: ["Array", "Graph", "Stack", "Queue"], a: 1 },
                { q: "Which algorithm is used for shortest path in graphs?", o: ["Merge Sort", "Dijkstra", "Binary Search", "Bubble Sort"], a: 1 },
                { q: "What is an Adjacency Matrix?", o: ["A graph representation", "A sorting method", "A tree traversal", "A stack operation"], a: 0 },
                { q: "Which traversal visits nodes layer by layer?", o: ["DFS", "BFS", "In-order", "Pre-order"], a: 1 },
                { q: "A graph with no cycles is called?", o: ["Cyclic", "Acyclic", "Complete", "Dense"], a: 1 }
            ],
            "Algorithms": [
                { q: "What is the average time complexity of Quick Sort?", o: ["O(n)", "O(n log n)", "O(n²)", "O(1)"], a: 1 },
                { q: "Which search algorithm requires data to be sorted?", o: ["Linear Search", "Binary Search", "DFS", "Hashing"], a: 1 },
                { q: "What is 'Big O' used for?", o: ["Programming language", "Resource complexity", "Display font", "Database name"], a: 1 },
                { q: "Which sort is a 'Divide and Conquer' algorithm?", o: ["Selection Sort", "Merge Sort", "Insertion Sort", "Bubble Sort"], a: 1 },
                { q: "Insertion sort is efficient for what case?", o: ["Large arrays", "Nearly sorted arrays", "Reversed arrays", "Random arrays"], a: 1 }
            ]
        };

        const quizData = allQuizzes[category] || allQuizzes["Linear Data Structures"];
        let currentIdx = 0;
        let score = 0;
        let selectedOption = null;

        function loadQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('questionText').innerText = data.q;
            document.getElementById('questionCount').innerText = `Question ${currentIdx + 1} of ${quizData.length}`;
            document.getElementById('pbFill').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;

            const group = document.getElementById('optionsGroup');
            group.innerHTML = '';
            data.o.forEach((opt, i) => {
                group.innerHTML += `
                    <div class="option-card-wide" id="opt-${i}" onclick="selectOption(${i})">
                        <div class="option-indicator"></div>
                        <span>${opt}</span>
                    </div>
                `;
            });
            selectedOption = null;
            document.getElementById('nextBtn').innerText = (currentIdx === quizData.length - 1) ? "Finish Quiz" : "Next Question";
        }

        function selectOption(i) {
            document.querySelectorAll('.option-card-wide').forEach(el => el.classList.remove('selected'));
            document.getElementById(`opt-${i}`).classList.add('selected');
            selectedOption = i;
        }

        function handleNext() {
            if (selectedOption === null) {
                alert("Please select an answer to continue.");
                return;
            }

            if (selectedOption === quizData[currentIdx].a) {
                score++;
            }

            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                localStorage.setItem('quizResult', JSON.stringify({
                    category: category,
                    score: score,
                    total: quizData.length
                }));
                window.location.href = 'result.html';
            }
        }

        function exitQuiz() {
            if (confirm("Are you sure you want to exit? Your progress will not be saved.")) {
                window.location.href = 'practice.html';
            }
        }

        loadQuestion();
    </script>
</body>

</html>
